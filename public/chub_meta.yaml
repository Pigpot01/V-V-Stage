project_name: "Vice & Violence Mechanics"
tagline: "Manual sheets, encounter tracking, and prompt rules for V&V."
visibility: "UNLISTED"
position: "ADJACENT"
tags:
  - "Stage"
  - "RPG"
  - "Vice & Violence"
  - "Mechanics"

config_schema:
  type: object
  properties:
    lewdLevel:
      type: string
      enum:
        - "LL1"
        - "LL2"
        - "LL3"
      default: "LL2"
    includeStageDirections:
      type: boolean
      default: true
    compactPromptSummary:
      type: boolean
      default: true
